// ── FERIADOS / CALENDÁRIO PT ────────────────────────────────
const PT_FIXED_HOLIDAYS = [
  [0,1],[3,25],[4,1],[5,10],[7,15],[9,5],[10,1],[10,11],[11,8],[11,25],
];

function getEaster(year) {
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4;
  const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3);
  const h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4;
  const l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31)-1;
  const day=((h+l-7*m+114)%31)+1;
  return new Date(year,month,day);
}

function getPortugalHolidays(year) {
  const h=new Set();
  PT_FIXED_HOLIDAYS.forEach(([m,d])=>h.add(`${year}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`));
  const easter=getEaster(year);
  [new Date(easter.getTime()-2*86400000), new Date(easter.getTime()+60*86400000)].forEach(d=>{
    h.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`);
  });
  return h;
}

function isHolidayOrWeekend(date,hols) {
  const dow=date.getDay();
  if(dow===0||dow===6) return true;
  return hols.has(`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`);
}

function prevWorkingDay(date,hols) {
  const d=new Date(date);
  while(isHolidayOrWeekend(d,hols)) d.setDate(d.getDate()-1);
  return d;
}

function nextWorkingDay(date,hols) {
  const d=new Date(date);
  while(isHolidayOrWeekend(d,hols)) d.setDate(d.getDate()+1);
  return d;
}

// Calcula o dia de início do ciclo salarial para um dado mês/ano
// O salário é pago no dia 23, ou no dia útil ANTERIOR se feriado/fds
function getSalaryCycleStart(year, month) {
  const hols = getPortugalHolidays(year);
  const raw  = new Date(year, month, 23);
  return prevWorkingDay(raw, hols);
}

// Devolve { start, end } do ciclo salarial que contém a data `referenceDate`
function getSalaryCycle(referenceDate) {
  const d = referenceDate;
  const y = d.getFullYear(), m = d.getMonth();
  const startThisMonth = getSalaryCycleStart(y, m);
  const prevM = m === 0 ? 11 : m - 1;
  const prevY = m === 0 ? y - 1 : y;
  const startPrevMonth = getSalaryCycleStart(prevY, prevM);
  let cycleStart, cycleEnd;
  if (d >= startThisMonth) {
    cycleStart = startThisMonth;
    const nextM = m === 11 ? 0 : m + 1;
    const nextY = m === 11 ? y + 1 : y;
    cycleEnd = new Date(nextY, nextM, 22);
  } else {
    cycleStart = startPrevMonth;
    cycleEnd = new Date(y, m, 22);
  }
  return { start: cycleStart, end: cycleEnd };
}

// Avança ou recua N ciclos sem depender de datas intermédias
function shiftCycle(baseCycle, offset) {
  const s = baseCycle.start;
  let y = s.getFullYear();
  let m = s.getMonth() + offset;
  while (m > 11) { m -= 12; y++; }
  while (m < 0)  { m += 12; y--; }
  const newStart = getSalaryCycleStart(y, m);
  const endM = m === 11 ? 0 : m + 1;
  const endY = m === 11 ? y + 1 : y;
  return { start: newStart, end: new Date(endY, endM, 22) };
}

function getRecurringDate(year,month,originalDay,recurringType){
  const lastDay=new Date(year,month+1,0).getDate();
  const day=Math.min(originalDay,lastDay);
  const date=new Date(year,month,day);
  if(recurringType==="workday"){ const h=getPortugalHolidays(year); return nextWorkingDay(date,h); }
  return date;
}

function dateToStr(date){
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
}

function strToDate(s){ return new Date(s+"T12:00:00"); }

const today = new Date();

function formatEUR(val){

    if(sessionStorage.getItem(key)) return;
    const recurrents=transactions.filter(t=>t.recurringType&&t.recurringType!=="none");
    if(recurrents.length===0){sessionStorage.setItem(key,"1");return;}
    const already=transactions.filter(t=>{
      const d=strToDate(t.date);
      return d>=cycle.start&&d<=cycle.end&&t.recurringType&&t.recurringType!=="none";
    });
    if(already.length===0){
      const newOnes=recurrents.map(t=>{
        const originalDay=parseInt(t.date.split("-")[2],10);
        const newDate=getRecurringDate(cycle.start.getFullYear(),cycle.start.getMonth(),originalDay,t.recurringType);
        return {...t,id:Date.now()+Math.random(),date:dateToStr(newDate)};
      });
      setAccounts(prev=>{
        const updated=[...prev];
        newOnes.forEach(t=>{
          const idx=updated.findIndex(a=>a.id===t.accountId);
          if(idx!==-1) updated[idx]={...updated[idx],balance:updated[idx].balance-t.amount};
        });
        return updated;
      });
      setTransactions(prev=>[...prev,...newOnes]);
    }

  },[cycle]);

    return d>=cycle.start && d<=cycle.end;
  });

    // referência: primeiro dia do ciclo actual menos i meses
    const refDate = new Date(cycle.start);
    refDate.setMonth(refDate.getMonth()-i);
    const c = getSalaryCycle(refDate.getMonth()===cycle.start.getMonth()&&refDate.getFullYear()===cycle.start.getFullYear()
      ? new Date(refDate.getFullYear(), refDate.getMonth(), 20) // antes do dia 23
      : refDate);

    const cyc = i===0 ? cycle : getSalaryCycle(new Date(cycle.start.getFullYear(), cycle.start.getMonth()-i, 20));
    const total=transactions.filter(t=>{const d=strToDate(t.date);return d>=cyc.start&&d<=cyc.end;}).reduce((s,t)=>s+t.amount,0);
    const label=`${String(cyc.start.getDate()).padStart(2,"0")}/${MONTHS[cyc.start.getMonth()]}`;
    return {name:label,total,isCurrent:i===0};
  }).reverse();

    if(!form.description||!form.amount||!form.date){showToast("Preencha todos os campos!","error");return;}
    if(!form.accountId){showToast("Seleciona uma conta!","error");return;}
    const amount=parseFloat(form.amount);
    setAccounts(prev=>prev.map(a=>a.id===form.accountId?{...a,balance:a.balance-amount}:a));
    setTransactions(prev=>[...prev,{...form,id:Date.now(),amount}]);
    setForm({description:"",amount:"",category:"alimentacao",date:today.toISOString().split("T")[0],recurringType:"none",accountId:"",receipt:null});
    setReceiptPreview(null);
    showToast("Transação adicionada!");
    setView("dashboard");
  };

    const t=transactions.find(x=>x.id===id);
    if(t?.accountId) setAccounts(prev=>prev.map(a=>a.id===t.accountId?{...a,balance:a.balance+t.amount}:a));
    setTransactions(prev=>prev.filter(x=>x.id!==id));

    showToast("Saldo atualizado!");

    if(transactions.some(t=>t.accountId===id)){showToast("Conta tem transações associadas!","error");return;}
    setAccounts(prev=>prev.filter(a=>a.id!==id));
    showToast("Conta removida.","info");

  const handleSaveBudget=(catId,val)=>{
    const n=parseFloat(val);
    setBudgets(prev=>({...prev,[catId]:isNaN(n)||n<=0?undefined:n}));

  const prevCycle=()=>setCycle(c=>shiftCycle(c,-1));
  const nextCycle=()=>setCycle(c=>shiftCycle(c,+1));

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#0F0F13",minHeight:"100vh",color:"#E8E8F0",maxWidth:480,margin:"0 auto",position:"relative",paddingBottom:110}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}

        .nav-btn.active{color:#C4B5FD;}

        .input-field{width:100%;background:#1E1E2A;border:1px solid #2E2E3E;border-radius:10px;color:#E8E8F0;padding:12px 14px;font-size:15px;outline:none;transition:border .2s;}

        .input-field::placeholder{color:#555;}

                        </div>
                        <div style={{display:"flex",gap:8}}>
                          <button onClick={()=>handleDeleteCategory(cat.id)}
                            style={{flex:1,background:"#7F1D1D",border:"1px solid #EF4444",borderRadius:8,color:"#FCA5A5",cursor:"pointer",fontWeight:700,padding:"8px",fontSize:13}}>
                            Sim, eliminar
                          </button>
                          <button onClick={()=>setConfirmDeleteCat(null)}
                            style={{flex:1,background:"#1E1E2A",border:"1px solid #2E2E3E",borderRadius:8,color:"#888",cursor:"pointer",fontWeight:700,padding:"8px",fontSize:13}}>
                            Cancelar
                          </button>
                        </div>
                      </div>
                    ):(
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:40,height:40,borderRadius:10,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{cat.icon}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:700,color:"#E0E0F0"}}>{cat.label}</div>
                          <div style={{fontSize:11,color:"#666",marginTop:2}}>{formatEUR(spent)} neste ciclo</div>
                        </div>
                        <button onClick={()=>setConfirmDeleteCat(cat.id)}
                          style={{background:"#2A1A1A",border:"1px solid #5A2020",borderRadius:8,color:"#F87171",cursor:"pointer",fontSize:12,fontWeight:700,padding:"5px 10px",flexShrink:0}}>
                          ✕
                        </button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <div className="card">
              <div style={{fontWeight:700,fontSize:15,marginBottom:14,color:"#C4B5FD"}}>➕ Nova Categoria</div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div><label className="label">Nome</label>
                  <input className="input-field" placeholder="Ex: Animais, Viagens..." value={newCat.label} onChange={e=>setNewCat(n=>({...n,label:e.target.value}))}/>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <div style={{flex:1}}><label className="label">Emoji</label>
                    <input className="input-field" placeholder="🏷️" value={newCat.icon} onChange={e=>setNewCat(n=>({...n,icon:e.target.value}))}/>
                  </div>
                  <div style={{flex:1}}><label className="label">Cor</label>
                    <input type="color" value={newCat.color} onChange={e=>setNewCat(n=>({...n,color:e.target.value}))} style={{width:"100%",height:44,borderRadius:10,border:"1px solid #2E2E3E",background:"#1E1E2A",cursor:"pointer",padding:2}}/>
                  </div>
                </div>
                <button className="btn-primary" onClick={handleAddCategory}>Criar Categoria</button>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ── BOTTOM NAV ── */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#12121A",borderTop:"1px solid #22223A",zIndex:100}}>
        {/* Linha principal */}
        <div style={{display:"flex",justifyContent:"space-around",alignItems:"flex-end",padding:"6px 0 10px"}}>
          <button className={`nav-btn ${view==="dashboard"?"active":""}`} onClick={()=>setView("dashboard")}>
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="2" fill="currentColor" opacity=".7"/><rect x="13" y="3" width="8" height="8" rx="2" fill="currentColor"/><rect x="3" y="13" width="8" height="8" rx="2" fill="currentColor"/><rect x="13" y="13" width="8" height="8" rx="2" fill="currentColor" opacity=".7"/></svg>
            Início
          </button>
          <button className={`nav-btn ${view==="accounts"?"active":""}`} onClick={()=>setView("accounts")}>
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="3" stroke="currentColor" strokeWidth="2"/><path d="M2 10h20" stroke="currentColor" strokeWidth="2"/><circle cx="7" cy="15" r="1.5" fill="currentColor"/></svg>
            Contas
          </button>
          <button className={`nav-btn ${view==="add"?"active":""}`} onClick={()=>setView("add")} style={{position:"relative",top:-10}}>
            <div style={{width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#7C3AED,#A855F7)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px #7C3AED66",fontSize:26}}>＋</div>
          </button>
          <button className={`nav-btn ${view==="history"?"active":""}`} onClick={()=>setView("history")}>
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h10M4 18h7" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
            Histórico
          </button>
          <button className={`nav-btn ${view==="budgets"?"active":""}`} onClick={()=>setView("budgets")}>
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="currentColor"/></svg>
            Limites
          </button>
        </div>
        {/* Barra secundária — Categorias */}
        <div style={{borderTop:"1px solid #1A1A28",display:"flex",justifyContent:"center",padding:"6px 0 8px",gap:8}}>
          <button className={`nav-btn ${view==="categories"?"active":""}`} onClick={()=>setView("categories")}
            style={{flexDirection:"row",gap:6,fontSize:11,padding:"4px 18px",borderRadius:20,background:view==="categories"?"#2D1F5A":"transparent",border:view==="categories"?"1px solid #5B21B6":"1px solid transparent"}}>
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="currentColor"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5.64 5.64l2.12 2.12M16.24 16.24l2.12 2.12M5.64 18.36l2.12-2.12M16.24 7.76l2.12-2.12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
            Gerir Categorias
          </button>
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
